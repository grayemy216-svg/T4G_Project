<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Butter &amp; Grey Bakery</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body class="page-contact">

  <input type="checkbox" class="nav-toggle" id="nav-toggle" />
  <label for="nav-toggle" class="nav-open-btn" aria-label="Open navigation">
    <i class="fa-solid fa-bars"></i>
  </label>

  <nav class="mobile-nav">
    <label for="nav-toggle" class="nav-close-btn"><i class="fa-solid fa-xmark"></i></label>
    <a href="../index.html">Home</a>
    <a href="menu.html">Menu</a>
    <a href="about.html">About</a>
    <a href="contact.html" class="active">Contact</a>
    <a href="login.html">Login</a>
    <a href="signup.html">Signup</a>
    <a href="shop.html"><i class="fa-solid fa-cart-shopping"></i> Cart</a>
  </nav>

  <nav class="navbar navbar--fixed" aria-label="Site navigation">
    <a href="../index.html" class="navbar-logo" aria-label="Home">
      <img src="../img/logo.jpeg" alt="" class="nav-logo-img" />
    </a>
    <a href="../index.html">Home</a>
    <a href="menu.html">Menu</a>
    <a href="about.html">About</a>
    <a href="contact.html" class="active">Contact</a>
    <a href="login.html">Login</a>
    <a href="signup.html">Signup</a>
    <a href="shop.html" aria-label="Cart"><i class="fa-solid fa-cart-shopping"></i></a>
  </nav>

  <div class="split-layout">

    <div class="split-photo" style="background: #d4c9b8;">
      <img src="../img/chef.jpeg" alt="Baker with cupcakes" />
    </div>

    <div class="contact-panel">
      <h2>Contact Us</h2>

      <div class="contact-detail">
        <div class="row"><i class="fa-solid fa-house"></i><span>Address</span></div>
        <p class="info">1st Exhibition Street, 28</p>
      </div>

      <div class="contact-detail">
        <div class="row"><i class="fa-regular fa-clock"></i><span>Hours</span></div>
        <p class="info">Mon &ndash; Sat: 9am &ndash; 7pm</p>
      </div>

      <div class="contact-detail">
        <div class="row"><i class="fa-solid fa-phone"></i><span>Phone</span></div>
        <p class="info">+233 502 041 841</p>
      </div>

      <div class="contact-detail">
        <div class="row"><i class="fa-solid fa-paper-plane"></i><span>Send a Message</span></div>
        <form class="contact-form">
          <input type="text"  id="contact-name"    name="name"    placeholder="Your Name" />
          <input type="email" id="contact-email"   name="email"   placeholder="Your Email" />
          <textarea           id="contact-message" name="message" rows="3" placeholder="Your message..."></textarea>
          <button type="submit" class="btn-send">
            <i class="fa-solid fa-paper-plane"></i> Send
          </button>
        </form>
      </div>

    </div>
  </div>

</body>
</html>
