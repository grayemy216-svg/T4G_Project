<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Butter &amp; Grey Bakery</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="page-login">

  <input type="checkbox" class="nav-toggle" id="nav-toggle" />
  <label for="nav-toggle" class="nav-open-btn" aria-label="Open navigation">
    <i class="fa-solid fa-bars"></i>
  </label>

  <nav class="mobile-nav">
    <label for="nav-toggle" class="nav-close-btn"><i class="fa-solid fa-xmark"></i></label>
    <a href="../index.html">Home</a>
    <a href="menu.html">Menu</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="login.html" class="active">Login</a>
    <a href="signup.html">Signup</a>
    <a href="shop.html"><i class="fa-solid fa-cart-shopping"></i> Cart</a>
  </nav>

  <nav class="navbar navbar--fixed" aria-label="Site navigation">
    <a href="../index.html" class="navbar-logo" aria-label="Home">
      <img src="../img/logo.jpeg" alt="" class="nav-logo-img" />
    </a>
    <a href="../index.html">Home</a>
    <a href="menu.html">Menu</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="login.html" class="active">Login</a>
    <a href="signup.html">Signup</a>
    <a href="shop.html" aria-label="Cart"><i class="fa-solid fa-cart-shopping"></i></a>
  </nav>

  <div class="split-layout">

    <div class="split-photo">
      <img src="../img/croissant_with_strawberry.jpeg" alt="Pink glazed croissant with strawberries" />
    </div>

    <div class="split-form auth-panel">
      <a href="../index.html">
        <img src="../img/logo.jpeg" alt="Butter &amp; Grey Bakery" class="auth-logo-img" />
      </a>

      <h2>Login</h2>

      <!-- action redirects to home on submit (no JS backend) -->
      <form class="auth-form auth-form--centered" action="../index.html" method="get">
        <div class="field">
          <label for="email"><i class="fa-solid fa-envelope"></i> Email</label>
          <input type="email" id="email" name="email" class="rounded"
                 placeholder="Enter your email" required />
        </div>
        <div class="field">
          <label for="password"><i class="fa-solid fa-lock"></i> Password</label>
          <input type="password" id="password" name="password" class="rounded"
                 placeholder="Enter your password" required />
        </div>
        <span class="forgot-link">I have forgotten my password</span>
        <button type="submit" class="btn-login">Login</button>
      </form>

      <p class="auth-switch">Don't have an account? <a href="signup.html">Sign up here</a></p>
    </div>

  </div>

</body>
</html>
